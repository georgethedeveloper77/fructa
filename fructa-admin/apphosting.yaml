# Firebase App Hosting config (project: fructa-14e48, europe-west4 backend).
# Single source of truth for env. NEXT_PUBLIC_* inline at BUILD; secrets that
# feed them therefore need BUILD availability. Service-role stays RUNTIME-only.

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # Public URL — read by anon clients (browser) and the service-role client.
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://lxtyrtgyfrhxyjraroku.supabase.co
    availability:
      - BUILD
      - RUNTIME

  # Server-side URL for server.ts / publish.ts (falls back to NEXT_PUBLIC_URL,
  # but set explicitly so publish.ts has it at runtime).
  - variable: SUPABASE_URL
    value: https://lxtyrtgyfrhxyjraroku.supabase.co
    availability:
      - RUNTIME

  # Publishable/anon key — safe in the browser bundle. Via Secret Manager only
  # to satisfy GitHub push protection; still inlined at BUILD.
  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: supabase-anon-key
    availability:
      - BUILD
      - RUNTIME

  # Owner allowlist used by proxy.ts.
  - variable: ADMIN_EMAIL
    value: georgekarani77@gmail.com
    availability:
      - RUNTIME

  # Service-role key — secret, RUNTIME ONLY. Bypasses RLS; never at BUILD.
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: supabase-service-role-key
    availability:
      - RUNTIME

  # Cron secret for the publish-snapshot re-publish call.
  - variable: CRON_SECRET
    secret: cron-secret
    availability:
      - RUNTIME

  - variable: GITHUB_REPO
    value: georgethedeveloper77/fructa
    availability:
      - RUNTIME
