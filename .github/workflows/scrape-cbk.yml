name: scrape-cbk

on:
  schedule:
    # T-bill results post Thursday. Run Thu 14:00 UTC (17:00 EAT), after they're up.
    - cron: "0 14 * * 4"
  workflow_dispatch: {}   # adds a manual "Run workflow" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22, not 20.
          #
          # supabase-js builds a RealtimeClient inside createClient() whether or
          # not you ever use realtime, and that constructor needs a global
          # WebSocket. Node 20 has none, so createClient() threw on line 18 and
          # this scraper died before it fetched anything. It has NEVER completed
          # a run: both scheduled attempts (2 Jul, 9 Jul) failed this way, and
          # because it dies before writing a scraper_runs row, admin showed it as
          # "never run" rather than "failing".
          #
          # Node 22 has a native WebSocket. Do not install `ws` and do not pass a
          # transport: we do not want realtime at all, we just need the
          # constructor to stop throwing.
          node-version: "22"
      - name: Install deps + browser
        working-directory: scrapers
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Scrape CBK T-bills
        working-directory: scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node cbk-tbills.mjs
