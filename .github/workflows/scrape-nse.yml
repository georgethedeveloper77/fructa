name: scrape-nse

# NSE end-of-day prices.
#
# Two steps, on purpose:
#
#   1. Chromium (Playwright) FETCHES the board. It has to be a real browser: afx
#      does not answer plain fetch() calls. We watched it hang from Supabase's
#      edge (killed at 150s) and from this same GitHub runner (aborted at 30s),
#      with an honest bot user agent and with a real Chrome string. Never a 403,
#      never a 429, never a challenge page: silence. That is bot protection
#      dropping the connection on the TLS fingerprint, before any HTTP happens.
#      A refusal has a status code; this had none.
#
#   2. Deno PARSES and POSTS it to the scrape-nse edge function, which still owns
#      ticker mapping, the sanity band, prev_close from our own stored series,
#      source health, the run log and the snapshot rebuild.
#
# The runner is deliberately dumb. It does not hold a service key and it does not
# write to stock_prices. Every check lives in the edge function, in one place,
# and the checks are the product.

on:
  schedule:
    # 16:00 UTC = 19:00 EAT, weekdays. The NSE trades 09:00 to 15:00 EAT, so this
    # is four hours after the close: late enough for the final board, early
    # enough to still be the same calendar day in Nairobi.
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Chromium
        run: |
          npm install playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Fetch the board with a real browser
        env:
          NSE_HTML_FILE: /tmp/nse.html
        run: node scrapers/fetch-nse-html.mjs

      - name: Parse it and post it to scrape-nse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NSE_HTML_FILE: /tmp/nse.html
          TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'cron' }}
        run: deno run --allow-net --allow-env --allow-read supabase/scripts/nse-fetch-post.ts

      # The HTML, kept when the run fails. If afx serves a challenge page or
      # moves its layout, the page itself is the evidence, and re-running to
      # "see what happened" is how you find out it only happens at 19:00 EAT.
      - name: Keep the page when it goes wrong
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nse-html
          path: /tmp/nse.html
          if-no-files-found: ignore
          retention-days: 7
