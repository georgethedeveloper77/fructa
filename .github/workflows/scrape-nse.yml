name: scrape-nse

# NSE end-of-day prices.
#
# Two steps, on purpose:
#
#   1. Chromium (Playwright) FETCHES the board.
#
#      A NOTE ON WHY, BECAUSE THE FIRST EXPLANATION HERE WAS WRONG.
#
#      This comment used to say afx was fingerprinting our TLS handshake and that
#      a real browser would get through. That was a guess, it was stated with
#      more confidence than it had earned, and Playwright disproved it: real
#      Chromium, real headers, real browser handshake, and afx still timed out at
#      45 seconds from this runner.
#
#      Four attempts, two networks, three client types, always silence and never
#      a status code:
#
#        Deno fetch, bot UA      Supabase edge     hung, killed at 150s
#        Deno fetch, Chrome UA   Supabase edge     hung, killed at 150s
#        Deno fetch, Chrome UA   GitHub runner     hung, aborted at 30s
#        Chromium (Playwright)   GitHub runner     hung, timed out at 45s
#
#      afx blocks DATACENTER IP RANGES. Not headers, not handshakes: the address.
#      No client-side cleverness fixes that, and afx cannot be our source from any
#      cloud runner. The replacement source comes from probe-sources.yml, which
#      tests reachability and freshness from this exact runner before anyone
#      writes a parser.
#
#   2. Deno PARSES and POSTS it to the scrape-nse edge function, which still owns
#      ticker mapping, the sanity band, prev_close from our own stored series,
#      source health, the run log and the snapshot rebuild.
#
# The runner is deliberately dumb. It does not hold a service key and it does not
# write to stock_prices. Every check lives in the edge function, in one place,
# and the checks are the product.

on:
  schedule:
    # 16:00 UTC = 19:00 EAT, weekdays. The NSE trades 09:00 to 15:00 EAT, so this
    # is four hours after the close: late enough for the final board, early
    # enough to still be the same calendar day in Nairobi.
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Chromium
        run: |
          npm install playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Fetch the board with a real browser
        env:
          NSE_HTML_FILE: /tmp/nse.html
        run: node scrapers/fetch-nse-html.mjs

      - name: Parse it and post it to scrape-nse
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NSE_HTML_FILE: /tmp/nse.html
          TRIGGER: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'cron' }}
        run: deno run --allow-net --allow-env --allow-read supabase/scripts/nse-fetch-post.ts

      # The HTML, kept when the run fails. If afx serves a challenge page or
      # moves its layout, the page itself is the evidence, and re-running to
      # "see what happened" is how you find out it only happens at 19:00 EAT.
      - name: Keep the page when it goes wrong
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nse-html
          path: /tmp/nse.html
          if-no-files-found: ignore
          retention-days: 7
