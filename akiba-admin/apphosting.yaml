# Firebase App Hosting config (europe-west4 backend).
# NEXT_PUBLIC_* vars MUST be available at BUILD as well as RUNTIME, or they get
# inlined as `undefined` and the proxy throws "supabaseUrl is required" -> 500 on /login.

runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # Public by design — safe as plain values.
  - variable: NEXT_PUBLIC_SUPABASE_URL
    value: https://lxtyrtgyfrhxyjraroku.supabase.co
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    value: PASTE_ANON_KEY_HERE   # Supabase Dashboard -> Project Settings -> API -> anon/public
    availability:
      - BUILD
      - RUNTIME

  # Optional owner allowlist used by proxy.ts.
  - variable: ADMIN_EMAIL
    value: georgekarani77@gmail.com
    availability:
      - RUNTIME

  # SECRET — never a plain value. Create it first (see notes), then reference by name.
  # Only needed by server actions that use the service role, not by the proxy.
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: supabase-service-role-key
    availability:
      - RUNTIME
